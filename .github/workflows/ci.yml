name: CI

on:
  push:
  pull_request:

jobs:
  release-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: python -m pip install --no-deps -e .
      - name: Run complete release audit
        run: python scripts/check_release.py
      - name: Validate selected-failure corpus
        run: kvcachebench validate data/processed/selected_failures/all_selected_failures.jsonl
      - name: Regenerate a summary
        run: kvcachebench summarize data/processed/selected_failures/all_selected_failures.jsonl --group-by dataset,method_name,retained_budget --output /tmp/selected_failures_summary.csv
      - name: Run smoke tests without pytest dependency
        run: |
          python - <<'PY'
          from pathlib import Path
          from kvcachebench.scoring import score_prediction
          from kvcachebench.io import read_jsonl
          from kvcachebench.diagnostics import validate_selected_failure_rows

          assert score_prediction('The code is RLHZW.', ['RLHZW'])['correct'] is True
          mc = score_prediction('Answer: C', ['C'])
          assert mc['correct'] is True and mc['extracted_answer'] == 'C'
          rows = read_jsonl(Path('tests/fixtures/selected_failures_sample.jsonl'))
          report = validate_selected_failure_rows(rows)
          assert report['ok'], report
          full = validate_selected_failure_rows(
              read_jsonl('data/processed/selected_failures/all_selected_failures.jsonl')
          )
          assert full['rows'] == 12520 and full['error_count'] == 0, full
          assert full['attention_available'] == 7038, full
          assert full['topk_available'] == 8400, full
          PY
